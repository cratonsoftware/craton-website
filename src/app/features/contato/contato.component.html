<section id="contato" class="bg-cts-n6 text-cts-n2 py-24 lg:py-32">
	<div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
		<div class="grid gap-16 lg:grid-cols-2">
			<div class="flex flex-col justify-center">
				<span class="font-poppins text-cts-destaque text-sm font-semibold tracking-wider uppercase"> Fale Conosco </span>
				<h2 class="font-poppins text-cts-n0 mt-2 text-3xl font-bold sm:text-4xl">Vamos construir a fundação do seu negócio?</h2>
				<p class="text-cts-n2 mt-6 text-lg">Preencha o formulário ao lado ou agende uma demonstração. Estamos prontos para entender seu desafio e desenhar a solução de software estável que sua empresa merece.</p>

				<div class="border-cts-n4/50 mt-8 border-t pt-8">
					<div class="flex items-center gap-4">
						<mat-icon class="text-cts-destaque! size-6!" svgIcon="mail_alt" />
						<span class="text-cts-n0 text-lg"> contato&#64;craton.com.br </span>
					</div>
				</div>
			</div>

			<div class="bg-cts-n4/50 rounded-xl p-8 shadow-lg">
				<form action="https://formspree.io/f/mldadzyr" method="POST" class="space-y-6">
					<div>
						<label for="nome" class="text-cts-n0 text-sm font-medium"> Nome Completo </label>
						<input type="text" name="nome" id="nome" required class="border-cts-n2 text-cts-n0 ring-cts-destaque focus:border-cts-destaque mt-2 block w-full rounded-lg border bg-transparent px-4 py-3 ring-inset focus:ring-1" />
					</div>

					<div>
						<label for="email" class="text-cts-n0 text-sm font-medium"> E-mail </label>
						<input type="email" name="email" id="email" required class="border-cts-n2 text-cts-n0 ring-cts-destaque focus:border-cts-destaque mt-2 block w-full rounded-lg border bg-transparent px-4 py-3 ring-inset focus:ring-1" />
					</div>

					<div>
						<label for="telefone" class="text-cts-n0 flex items-center justify-between text-sm font-medium">
							<span>Telefone / WhatsApp</span>
							<span class="text-cts-n2">(Opcional)</span>
						</label>
						<input
							type="tel"
							name="telefone"
							id="telefone"
							mask="(00) 0000-0000||(00) 00000-0000"
							class="border-cts-n2 text-cts-n0 ring-cts-destaque focus:border-cts-destaque mt-2 block w-full rounded-lg border bg-transparent px-4 py-3 ring-inset focus:ring-1" />
					</div>

					<div>
						<label for="mensagem" class="text-cts-n0 text-sm font-medium"> Sua Mensagem </label>
						<textarea
							name="mensagem"
							id="mensagem"
							rows="4"
							required
							class="border-cts-n2 text-cts-n0 ring-cts-destaque focus:border-cts-destaque mt-2 block w-full rounded-lg border bg-transparent px-4 py-3 ring-inset focus:ring-1"></textarea>
					</div>

					<div>
						<button
							type="submit"
							class="bg-cts-destaque font-poppins text-cts-n0 focus:ring-cts-destaque focus:ring-offset-cts-n6 w-full transform cursor-pointer rounded-lg px-8 py-3 text-lg font-semibold transition duration-300 ease-in-out hover:-translate-y-0.5 hover:shadow-xl focus:ring-2 focus:ring-offset-2 focus:outline-none">
							Enviar Mensagem
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</section>
